<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonVault - Pendiente de Aprobación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/pending.css">
    <script src="js/pending.js" defer></script>
</head>
<body>

    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="status-icon">
                <i class="fa-solid fa-clock"></i>
            </div>
            <h2>Cuenta <span>Pendiente</span> de Aprobación</h2>
            <p>Tu cuenta ha sido registrada exitosamente, pero necesita ser <strong>aprobada por un administrador</strong> antes de que puedas acceder al sistema de mensajería.</p>
            <p>Te notificaremos cuando tu cuenta sea aprobada.</p>
            <div class="email-highlight" id="userEmail">usuario@email.com</div>
            <br>
            <a href="login.html" class="btn">
                <i class="fa-solid fa-arrow-left"></i> Volver al Inicio de Sesión
            </a>
        </div>
    </div>
</body>
</html>
