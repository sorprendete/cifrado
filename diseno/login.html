<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonVault - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
    
</head>
<body>

    <!-- Partículas de fondo -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Contenedor de autenticación -->
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1>Neon<span>Vault</span></h1>
                <p>Mensajería cifrada de extremo a extremo</p>
            </div>

            <!-- Alerta de error (oculta por defecto) -->
            <div class="alert alert-error" id="alertError" style="display: none;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="alertErrorMessage">Credenciales incorrectas</span>
            </div>

            <!-- Formulario de login -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="email">Correo electrónico o usuario</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="text" id="email" placeholder="tu@email.com" required autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="btnLogin">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                ¿No tienes cuenta? <a href="register.html">Crear una cuenta</a>
            </div>
        </div>
    </div>
</body>
</html>
